[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_FIREBASE_API_KEY,NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN,NEXT_PUBLIC_FIREBASE_PROJECT_ID,NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET,NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID,NEXT_PUBLIC_FIREBASE_APP_ID,NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Daily 03:30 UTC (~09:00 IST) — fires the T-3-day plan-expiry reminder sweep.
# The function is a thin wrapper that calls /api/cron/expiry-reminder with the
# CRON_SECRET. See netlify/functions/expiry-reminder.mts.
[functions."expiry-reminder"]
  schedule = "30 3 * * *"
